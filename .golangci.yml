# golangci-lint v2 config. Keep cyclomatic complexity low, no duplication,
# errors handled, security-conscious. Runs in CI and locally via `make lint`.
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gocyclo
    - gocognit
    - dupl
    - misspell
    - unconvert
    - unparam
    - gosec
    - bodyclose
    - noctx
    - errorlint
    - nilerr
    - nolintlint

  settings:
    gocyclo:
      min-complexity: 10
    gocognit:
      min-complexity: 15
    dupl:
      threshold: 120
    revive:
      rules:
        - name: var-naming
        - name: exported
        - name: package-comments
        - name: unexported-return
        - name: error-return
        - name: error-strings
        - name: error-naming

  exclusions:
    rules:
      # Test files may have longer table-driven tests and duplicated setup.
      - path: _test\.go
        linters: [gocognit, gocyclo, dupl, gosec, unparam, errcheck]
      # Generated files (none yet, but future-proof).
      - path: \.gen\.go
        linters: [revive]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
