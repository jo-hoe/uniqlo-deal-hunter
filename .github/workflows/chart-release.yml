name: chart-release

# Push the Helm chart to GHCR as an OCI artifact whenever Chart.yaml changes
# on main. Users install via:
#   helm install <name> oci://ghcr.io/<owner>/charts/uniqlo-deal-hunter --version <ver>

on:
  push:
    branches: [main]
    paths:
      - "charts/uniqlo-deal-hunter/Chart.yaml"

permissions:
  contents: read
  packages: write

jobs:
  push-oci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Read chart version
        id: chart
        run: |
          version=$(yq '.version' charts/uniqlo-deal-hunter/Chart.yaml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p dist
          helm package charts/uniqlo-deal-hunter -d dist

      - name: Push OCI chart
        run: |
          helm push \
            dist/uniqlo-deal-hunter-${{ steps.chart.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
