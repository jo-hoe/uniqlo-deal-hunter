name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 15 * *"   # monthly canary

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy -diff
      - name: Vet
        run: go vet ./...
      - name: Unit tests with race + coverage
        run: |
          go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -5
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  integration:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Integration tests
        run: go test -race -count=1 -tags=integration ./test/integration/...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - name: helm lint
        run: helm lint charts/uniqlo-deal-hunter
      - name: helm template
        run: helm template test charts/uniqlo-deal-hunter --set notifier.smtp.passwordSecret.name=x
      - name: helm-docs drift check
        run: |
          docker run --rm --volume "$PWD/charts:/helm-docs" jnorwood/helm-docs:v1.14.2
          if ! git diff --exit-code -- charts; then
            echo "::error::charts/*/README.md is out of date. Run 'make generate-helm-docs' and commit."
            exit 1
          fi
